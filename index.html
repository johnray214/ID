<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACCGEA ID Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0d1526;
    --panel:   #111d33;
    --surface: #172035;
    --border:  #1f3050;
    --accent:  #192bc2;
    --accent2: #2e46e0;
    --muted:   #4a6080;
    --label:   #7a96b8;
    --text:    #cdd9ec;
    --white:   #ffffff;
    --green:   #22c55e;
    --red:     #ef4444;
    --amber:   #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(25,43,194,0.18) 0%, transparent 70%);
  }

  /* ── HEADER BAR ── */
  .topbar {
    width: 100%;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topbar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(46,70,224,0.8);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(46,70,224,0.8); }
    50%       { opacity: 0.6; box-shadow: 0 0 3px rgba(46,70,224,0.4); }
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .topbar-sub {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    width: 100%;
    max-width: 920px;
    padding: 36px 24px;
    justify-content: center;
    align-items: flex-start;
    gap: 28px;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .panel-heading {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── PHOTO UPLOAD ZONE ── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .upload-zone:hover { border-color: var(--accent2); }

  .upload-zone-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-inner {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* thumbnail */
  .thumb {
    width: 68px;
    height: 68px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--navy);
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .thumb-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .thumb-empty svg { opacity: 0.3; }

  .thumb-empty span {
    font-size: 9px;
    color: var(--muted);
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
  }

  .upload-controls {
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex: 1;
  }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  .btn-pick {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-pick:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-save {
    flex: 1;
    background: transparent;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-save:hover { background: rgba(34,197,94,0.1); transform: translateY(-1px); }

  .btn-discard {
    flex: 1;
    background: transparent;
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-discard:hover { background: rgba(239,68,68,0.1); transform: translateY(-1px); }

  .photo-status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  /* ── FORM FIELDS ── */
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-size: 10px;
    font-weight: 700;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .field input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .field input::placeholder { color: var(--muted); font-weight: 400; }

  .field input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(46,70,224,0.15);
  }

  /* number spin hide */
  .field input[type=number]::-webkit-inner-spin-button,
  .field input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0 20px;
  }

  /* ── DOWNLOAD BUTTON ── */
  .btn-download {
    width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(25,43,194,0.4);
    position: relative;
    overflow: hidden;
  }

  .btn-download::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(25,43,194,0.55);
  }

  .btn-download:active { transform: translateY(0); }

  .btn-download svg {
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    flex-shrink: 0;
  }

  .btn-download:hover svg { transform: translateY(3px); }

  .btn-download.loading {
    opacity: 0.75;
    pointer-events: none;
  }

  .btn-download.loading svg {
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .preview-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--label);
    letter-spacing: 2px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* ─── THE CARD (UNCHANGED STRUCTURE) ─── */
  .id-card {
    position: relative;
    width: 298px;
    height: 430px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 20px 60px rgba(0,0,0,0.6),
      0 4px 16px rgba(0,0,0,0.4);
  }

  .id-card .bg-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: fill;
    z-index: 0;
  }

  /* ── PHOTO OVERLAY — UNTOUCHED ── */
  .photo-overlay {
    position: absolute;
    top: 72px;
    left: 97px;
    width: 171px;
    height: 172px;
    overflow: hidden;
    z-index: 2;
    background: #ffffff;
    border: none;
  }

  .photo-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── NAME TEXT ── */
  .card-name {
    position: absolute;
    top: 270px;
    left: 50px;
    right: 6px;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #1a1a1a;
    text-transform: uppercase;
    line-height: 1.25;
    z-index: 3;
  }

  /* ── POSITION TEXT ── */
  .card-position {
    position: absolute;
    top: 300px;
    left: 50px;
    right: 6px;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: #1a1a1a;
    text-transform: uppercase;
    z-index: 3;
  }

  /* ── OFFICE TEXT ── */
  .card-office {
    position: absolute;
    top: 318px;
    left: 50px;
    right: 6px;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: #192bc2;
    text-transform: uppercase;
    z-index: 3;
  }

  /* ── ID NUMBER TEXT ── */
  .card-id {
    position: absolute;
    top: 332px;
    left: 160px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: #000000;
    z-index: 3;
  }

</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-dot"></div>
    <span class="topbar-title">SACCGEA</span>
    <span class="topbar-sub">/ ID Card Generator</span>
  </div>
  <span class="topbar-sub">Santiago City Government Employees Association</span>
</div>

<div class="main">

  <!-- FORM PANEL -->
  <div class="form-panel">
    <div class="panel-heading">Employee Details</div>

    <!-- PHOTO UPLOAD -->
    <div class="upload-zone">
      <span class="upload-zone-label">ID Photo</span>
      <div class="upload-inner">

        <div class="thumb" id="thumbWrap">
          <div class="thumb-empty">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7a96b8" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>No photo</span>
          </div>
        </div>

        <div class="upload-controls">
          <div class="btn-row">
            <button class="btn-pick" id="btnPick" onclick="document.getElementById('photoInput').click()">Select Photo</button>
          </div>
          <div class="btn-row" id="confirmRow" style="display:none;">
            <button class="btn-save"    id="btnSave"    onclick="confirmPhoto()">Save</button>
            <button class="btn-discard" id="btnDiscard" onclick="cancelPhoto()">Discard</button>
          </div>
          <div class="photo-status-pill" id="statusPill">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">No photo selected</span>
          </div>
        </div>

      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none;">

    <!-- FIELDS -->
    <div class="field-group">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="inputName" placeholder="Juan Dela Cruz" oninput="update()">
      </div>
      <div class="field">
        <label>Position</label>
        <input type="text" id="inputPosition" placeholder="Clerk II" oninput="update()">
      </div>
      <div class="field">
        <label>Office</label>
        <input type="text" id="inputOffice" placeholder="City Mayor's Office" oninput="update()">
      </div>
      <div class="field">
        <label>ID Number</label>
        <input type="number" id="inputIDNum" value="1" min="1" oninput="update()">
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-download" id="btnDownload" onclick="downloadCard()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v13M5 14l7 7 7-7"/>
        <line x1="3" y1="21" x2="21" y2="21"/>
      </svg>
      Download ID Card
    </button>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <span class="preview-label">Live Preview</span>
    <div class="id-card">
      <img class="bg-img" src="ID.png" alt="ID Template">
      <div class="photo-overlay" id="photoOverlay"></div>
      <div class="card-name"     id="cardName">JUAN DELA CRUZ</div>
      <div class="card-position" id="cardPosition">POSITION</div>
      <div class="card-office"   id="cardOffice">OFFICE</div>
      <div class="card-id"       id="cardID">0001</div>
    </div>
  </div>

</div>

<script>
  let pendingDataURL   = null;
  let confirmedDataURL = null;

  function pad(n) { return String(n).padStart(4, '0'); }

  function setStatus(text, color) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusDot').style.background = color;
    document.getElementById('statusText').style.color = color;
  }

  function update() {
    const name     = document.getElementById('inputName').value.trim();
    const position = document.getElementById('inputPosition').value.trim();
    const office   = document.getElementById('inputOffice').value.trim();
    const idNum    = parseInt(document.getElementById('inputIDNum').value) || 1;

    document.getElementById('cardName').textContent     = name     ? name.toUpperCase()     : 'JUAN DELA CRUZ';
    document.getElementById('cardPosition').textContent = position ? position.toUpperCase() : 'POSITION';
    document.getElementById('cardOffice').textContent   = office   ? office.toUpperCase()   : 'OFFICE';
    document.getElementById('cardID').textContent       = pad(idNum);
  }

  document.getElementById('photoInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
      pendingDataURL = evt.target.result;

      // update thumbnail
      document.getElementById('thumbWrap').innerHTML =
        `<img src="${pendingDataURL}" alt="Preview">`;

      // show confirm/discard row, hide pick
      document.getElementById('confirmRow').style.display = 'flex';
      document.getElementById('btnPick').style.display    = 'none';

      setStatus('Awaiting confirmation', 'var(--amber)');

      // dim preview on card
      document.getElementById('photoOverlay').innerHTML =
        `<img src="${pendingDataURL}" alt="Photo" style="opacity:0.55;">`;
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  function confirmPhoto() {
    confirmedDataURL = pendingDataURL;
    pendingDataURL   = null;

    document.getElementById('photoOverlay').innerHTML =
      `<img src="${confirmedDataURL}" alt="Photo">`;

    document.getElementById('confirmRow').style.display = 'none';
    document.getElementById('btnPick').style.display    = 'block';
    setStatus('Photo saved', 'var(--green)');
  }

  function cancelPhoto() {
    pendingDataURL = null;

    document.getElementById('confirmRow').style.display = 'none';
    document.getElementById('btnPick').style.display    = 'block';

    const overlay = document.getElementById('photoOverlay');
    if (confirmedDataURL) {
      overlay.innerHTML = `<img src="${confirmedDataURL}" alt="Photo">`;
      document.getElementById('thumbWrap').innerHTML =
        `<img src="${confirmedDataURL}" alt="Preview">`;
      setStatus('Photo saved', 'var(--green)');
    } else {
      overlay.innerHTML = '';
      document.getElementById('thumbWrap').innerHTML = `
        <div class="thumb-empty">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7a96b8" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>No photo</span>
        </div>`;
      setStatus('No photo selected', 'var(--muted)');
    }
  }

  async function downloadCard() {
    const btn  = document.getElementById('btnDownload');
    const card = document.querySelector('.id-card');

    btn.classList.add('loading');
    btn.innerHTML = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
      </svg>
      Generating…`;

    try {
      const canvas = await html2canvas(card, {
        scale: 3, useCORS: true, allowTaint: true, backgroundColor: null
      });
      const link  = document.createElement('a');
      const name  = (document.getElementById('inputName').value.trim() || 'ID_CARD')
                      .toUpperCase().replace(/\s+/g, '_');
      link.download = `SACCGEA_${name}.png`;
      link.href     = canvas.toDataURL('image/png');
      link.click();
    } catch(err) {
      alert('Download failed. Please try again.');
      console.error(err);
    }

    btn.classList.remove('loading');
    btn.innerHTML = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v13M5 14l7 7 7-7"/>
        <line x1="3" y1="21" x2="21" y2="21"/>
      </svg>
      Download ID Card`;
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
